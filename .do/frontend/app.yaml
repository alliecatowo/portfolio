name: allisons-portfolio-frontend
services:
  - github:
      branch: deploy/digital-ocean
      deploy_on_push: true
      repo: allisonchanykei/portfolio
    name: frontend
    build_command: NODE_OPTIONS='--unhandled-rejections=strict --no-optional' npm run build
    environment_slug: node-js
    envs:
      - key: NODE_ENV
        scope: BUILD_TIME
        value: production
      - key: NODE_OPTIONS
        scope: BUILD_TIME
        value: --unhandled-rejections=strict --no-optional
      - key: DIRECTUS_URL
        scope: RUN_TIME
        value: https://directus.allisons.dev
      - key: API_URL
        scope: RUN_TIME
        value: https://api.allisons.dev
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    routes:
      - path: /
    source_dir: frontend
    run_command: node .output/server/index.mjs
domains:
  - domain: allisons.dev
    type: PRIMARY
  - domain: www.allisons.dev
    type: ALIAS
