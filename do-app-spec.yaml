name: allisons-portfolio
region: nyc
features:
  - new-nodejs-buildpack=true # Use latest Node.js buildpack

services:
  - name: portfolio-frontend
    github:
      repo: alliecatowo/portfolio
      branch: fix/portfolio-optimization
      deploy_on_push: true
    source_dir: /frontend
    environment_slug: node-js
    build_command: npm install && npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: "development" # Currently set to development for debugging
      - key: NUXT_PUBLIC_DIRECTUS_URL
        scope: RUN_TIME
        value: "https://directus.allisons.dev"
      - key: NUXT_PUBLIC_DIRECTUS_TOKEN
        scope: RUN_TIME
        value: "2eEMQA40l35OBtWNH6nDS166k0o800sb"
      - key: NUXT_PUBLIC_ENABLE_DEVTOOLS
        scope: RUN_TIME
        value: "true"
      - key: NUXT_DEV_TOOLS_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: NUXT_LOG_LEVEL
        scope: RUN_TIME
        value: "debug"
    health_check:
      http_path: /api/health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
